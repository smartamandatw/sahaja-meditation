    background-position: center center;
    z-index: 0;

  /* ── 進入畫面 ── */
  .enter-screen {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(10, 12, 8, 0.45);
    transition: opacity 0.8s ease;
    cursor: pointer;
  }
  .enter-screen.hide { opacity: 0; pointer-events: none; }

  .enter-logo {
    font-family: "Pinyon Script", cursive;
    font-size: clamp(58px, 15vw, 82px);
    color: #F0E8D0; line-height: 1.1;
    text-shadow: 0 2px 12px rgba(0,0,0,0.3);
    margin-bottom: 8px;
  }

  .enter-tap {
    font-family: "Noto Serif TC", serif;
    font-size: clamp(13px, 3.5vw, 16px);
    color: rgba(240, 232, 210, 0.75);
    letter-spacing: 0.25em; margin-top: 32px;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── 主歡迎頁 ── */
  .main-screen {
    position: fixed; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 10vh;
    opacity: 0; transition: opacity 1s ease 0.3s;
    pointer-events: none;
  }
  .main-screen.show { opacity: 1; pointer-events: auto; }

  .quote-wrap {
    position: relative; z-index: 1;
    width: 85%; max-width: 360px;
    margin-bottom: 12vh;
  }

  .quote-box {
    background: rgba(230, 222, 205, 0.52);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-radius: 10px;
    padding: clamp(22px, 5.5vw, 30px) clamp(14px, 3.5vw, 18px);
    text-align: center;
    border: 0.5px solid rgba(255,255,255,0.45);
  }

  .quote-text {
    font-family: "LXGW WenKai TC", "Noto Serif TC", serif;
    font-size: clamp(19px, 5vw, 22px);
    color: #1C1609; line-height: 2.1; letter-spacing: 0.10em;
    opacity: 0; transition: opacity 0.9s ease;
  }
  .quote-text.visible { opacity: 1; }

  .quote-author {
    font-family: "Noto Serif TC", serif;
    font-size: clamp(13px, 3.4vw, 15px);
    color: #4A3510; margin-top: 12px;
    letter-spacing: 0.06em; font-weight: 400;
    opacity: 0; transition: opacity 0.9s ease 0.3s;
  }
  .quote-author.visible { opacity: 1; }

  .buttons {
    position: relative; z-index: 1;
    width: 56%; max-width: 240px;
    display: flex; flex-direction: column;
    align-items: center; gap: 14px;
  }

  .btn {
    width: 100%; padding: 18px 10px; border-radius: 999px;
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    color: #1C1609; font-family: "Noto Sans TC", sans-serif;
    font-size: clamp(15px, 4vw, 17px);
    font-weight: 400; letter-spacing: 0.08em;
    cursor: pointer; text-align: center;
    transition: background 0.2s, transform 0.1s;
    border: 0.5px solid rgba(255,255,255,0.5);
  }
  .btn:active { transform: scale(0.97); }
  .btn-main { background: rgba(210, 200, 178, 0.62); }
  .btn-main:active { background: rgba(190,180,158,0.78); }
  .btn-sub { background: rgba(175, 165, 143, 0.55); }
  .btn-sub:active { background: rgba(155,145,123,0.7); }

  .sound-btn {
    position: fixed; bottom: 18px; right: 18px; z-index: 20;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(230,220,200,0.55); backdrop-filter: blur(6px);
    border: 0.5px solid rgba(255,255,255,0.4);
    display: none; align-items: center; justify-content: center;
    cursor: pointer; font-size: 17px;
  }
  .sound-btn.show { display: flex; }
  .sound-btn:active { background: rgba(200,190,170,0.8); }

  .streak {
    position: fixed; top: 14px; right: 16px; z-index: 20;
    font-size: 12px; color: #1C1609;
    background: rgba(230,220,200,0.6); backdrop-filter: blur(6px);
    padding: 4px 11px; border-radius: 999px;
    border: 0.5px solid rgba(255,255,255,0.45); display: none;
  }
  .streak.show { display: block; }
</style>
</head>
<body>

<div class="bg-base"></div>

<audio id="bgMusic" loop preload="none" crossorigin="anonymous">
  <source src="https://res.cloudinary.com/dvqmh3mia/video/upload/v1780553024/piano-violin-and-vocal-by-sia-reddy--video-by-petr-kominek_maesrw.mp3" type="audio/mp3">
</audio>

<!-- 進入畫面 -->
<div class="enter-screen" id="enterScreen" onclick="startApp()">
  <div class="enter-logo">Sahaja Yoga</div>
  <div class="enter-tap">輕觸進入</div>
</div>

<!-- 主歡迎頁 -->
<div class="main-screen" id="mainScreen">
  <div class="quote-wrap">
    <div class="quote-box">
      <div class="quote-text" id="quoteText"></div>
      <div class="quote-author" id="quoteAuthor">— Shri Mataji</div>
    </div>
  </div>
  <div class="buttons">
    <button class="btn btn-main" onclick="enterMeditation()">直接進入冥想室</button>
    <button class="btn btn-sub" onclick="openMenu()">功能選單</button>
  </div>
</div>

<div class="streak" id="streak"></div>
<div class="sound-btn" id="soundBtn" onclick="toggleSound()">🔊</div>

<script>
  const audio = document.getElementById("bgMusic");
  const soundBtn = document.getElementById("soundBtn");
  let muted = false;
  let started = false;

  function startApp() {
    if (started) return;
    started = true;

    audio.volume = 0.5;
    audio.play().catch(e => console.log("播放失敗:", e));

    document.getElementById("enterScreen").classList.add("hide");

    setTimeout(() => {
      document.getElementById("mainScreen").classList.add("show");
      soundBtn.classList.add("show");
      startQuotes();
    }, 400);
  }

  function toggleSound() {
    muted = !muted;
    audio.muted = muted;
    soundBtn.textContent = muted ? "🔇" : "🔊";
  }

  const quotes = [
    "「真正的靜默，\n是思想的靜止。」",
    "「靜坐不是努力，\n而是放下努力。」",
    "「你的內在有一份平靜，\n那是你與生俱來的。」",
    "「昆達里尼是你自己的能量，\n純潔的，溫柔的。」",
    "「愛是一切靈性成長的基礎，\n從愛自己開始。」",
  ];
  let current = 0;
  const textEl = document.getElementById("quoteText");
  const authorEl = document.getElementById("quoteAuthor");

  function showQuote(index) {
    textEl.classList.remove("visible");
    authorEl.classList.remove("visible");
    setTimeout(() => {
      textEl.innerHTML = quotes[index].replace(/\n/g, "<br>");
      textEl.classList.add("visible");
      authorEl.classList.add("visible");
    }, 900);
  }

  function startQuotes() {
    textEl.innerHTML = quotes[0].replace(/\n/g, "<br>");
    setTimeout(() => {
      textEl.classList.add("visible");
      authorEl.classList.add("visible");
    }, 400);
    setInterval(() => {
      current = (current + 1) % quotes.length;
      showQuote(current);
    }, 5000);
  }

  const streak = parseInt(localStorage.getItem("sahaja_streak") || "0");
  if (streak > 0) {
    const el = document.getElementById("streak");
    el.textContent = "🔥 連續靜坐 " + streak + " 天";
    el.classList.add("show");
  }

  function enterMeditation() { alert("下一頁：選擇靜坐環境（開發中）"); }
  function openMenu() { alert("功能選單（開發中）"); }
</script>
</body>
</html>
